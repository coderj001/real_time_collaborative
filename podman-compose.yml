version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_BACKEND_URL=http://localhost:4000
      - VITE_WS_URL=ws://localhost:4000
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://mongodb:27017/realtime-canvas
      - AUTH_USERNAME=admin
      - AUTH_PASSWORD=password
    depends_on:
      - redis
      - mongodb
    networks:
      - app-network

  redis:
    image: docker.io/library/redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - app-network

  mongodb:
    image: docker.io/library/mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongodb-data:
